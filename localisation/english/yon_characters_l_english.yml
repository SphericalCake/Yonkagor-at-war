l_english:
 kaiser_bigot:0 "Kaiser Seadrive"
 KAISER_BIGOT_DESC:0 "Kaiser Seadrive, born in 1881, was raised within one of the wealthiest and most influential aristocratic families of the Old Republic. From an early age, he displayed a keen interest in politics and governance, rapidly ascending through the ranks of government while still a young man. His ambition, charisma, and political skill allowed him to consolidate power over the years, eventually establishing himself as the unquestioned ruler of the Seadrive Imperium. Among both supporters and critics, Seadrive has earned a variety of nicknames, including Kaiser Bill and the more derogatory Kaiser Bigot, reflecting controversy surrounding his deeply traditional and conservative views. Despite the criticism, few can deny his effectiveness as a statesman. Governing with an iron fist, he has maintained strict order and stability throughout his decades-long reign. His policies emphasize national strength, cultural tradition, and social conservatism, making him a highly polarizing yet undeniably influential figure in the history of the Imperium.