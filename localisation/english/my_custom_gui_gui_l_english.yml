 information:0 "Yonkagor At War: Seadrive's Wrath"
 version:0 "YAW:SW is a mod created by SphericalCake for Hearts of Iron IV with the goal of creating a unique and niche experience centered around the community and themes inspired by YonKaGor. The project was developed as a passion-driven mod intended to provide entertainment while also encouraging strategic thinking and worldbuilding through gameplay. Beyond simply being a fan project, YAW:SW also shoots and aims to introduce more people within the HOI4 modding community to YonKaGor’s work and Music in general, helping spread recognition and appreciation through an interactive and community-focused experience that blends music-inspired concepts with grand strategy gameplay." 

