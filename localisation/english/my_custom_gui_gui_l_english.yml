 information_3:0 "The Yonkagor At War: Seadrive’s Wrath mod (YAW:SW) is not officially affiliated with or endorsed by Yonkagor or their team. YAW:SW is an independent fan project created by SphericalCake for entertainment, creative storytelling, and fictional worldbuilding purposes only, with the intention of providing a unique alternate-history experience inspired by the community surrounding Yonkagor’s music and characters."
